# Configuración de Fly.io para el backend de BetmarPlay.
# El nombre "app" se fija al correr `fly launch` (puedes cambiarlo).
# Los secretos (DATABASE_URL, JWT_*, etc.) se cargan con `fly secrets set`, NO aquí.

app = "betmarplay-server"
primary_region = "mia"  # Miami — cercano a Venezuela. Cámbialo si prefieres.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # always-on: no hibernar (clave para el tiempo real)
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
